name: Build libtailscale AAR

on:
  workflow_dispatch:
    inputs:
      tailscale_ref:
        description: 'tailscale-android git ref — leave blank for latest stable release tag'
        required: false
        default: ''
  workflow_call:
    inputs:
      tailscale_ref:
        description: 'tailscale-android git ref — leave blank for latest stable release tag'
        type: string
        required: false
        default: ''
    outputs:
      artifact_name:
        description: 'Name of the uploaded AAR artifact'
        value: ${{ jobs.build.outputs.artifact_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Resolve tailscale-android ref
        id: resolve
        run: |
          INPUT_REF="${{ inputs.tailscale_ref }}"
          if [ -z "$INPUT_REF" ]; then
            LATEST=$(curl -fsSL https://api.github.com/repos/tailscale/tailscale-android/releases/latest | jq -r .tag_name)
            echo "ref=$LATEST" >> "$GITHUB_OUTPUT"
            echo "Resolved latest stable tag: $LATEST"
          else
            echo "ref=$INPUT_REF" >> "$GITHUB_OUTPUT"
            echo "Using provided ref: $INPUT_REF"
          fi

      - name: Clone tailscale-android
        run: |
          git clone --depth 1 \
            --branch "${{ steps.resolve.outputs.ref }}" \
            https://github.com/tailscale/tailscale-android ts

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-libtailscale-${{ steps.resolve.outputs.ref }}
          restore-keys: go-libtailscale-

      # Install gomobile/gobind at the version pinned in tailscale-android's go.mod
      - name: Install gomobile and gobind
        working-directory: ts
        run: |
          go install golang.org/x/mobile/cmd/gobind
          go install golang.org/x/mobile/cmd/gomobile
          gomobile init

      - name: Build AAR
        working-directory: ts
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
        run: |
          mkdir -p android/libs
          # TOOLCHAIN_DIR must be non-empty so build-tags.sh outputs "not_tailscale_go"
          # instead of "tailscale_go". The "tailscale_go" tag pulls in code that uses
          # runtime.TailscaleCurrentP, a symbol only in Tailscale's patched Go fork.
          export TOOLCHAIN_DIR=$(go env GOROOT)
          BUILD_TAGS="$(./build-tags.sh) ts_omit_cachenetmap"
          gomobile bind \
            -target android \
            -androidapi 26 \
            -tags "$BUILD_TAGS" \
            -ldflags "-linkmode=external -extldflags=-Wl,-z,max-page-size=16384" \
            -o android/libs/libtailscale.aar \
            ./libtailscale

      - name: Set artifact name
        id: meta
        run: |
          REF="${{ steps.resolve.outputs.ref }}"
          echo "artifact_name=libtailscale-aar-${REF//\//-}" >> "$GITHUB_OUTPUT"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ts/android/libs/libtailscale.aar
          if-no-files-found: error
